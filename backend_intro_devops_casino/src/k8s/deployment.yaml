apiVersion: apps/v1
kind: Deployment
metadata:
  name: casino-backend
  labels:
    app: casino-backend # Coherente
spec:
  replicas: 2
  selector:
    matchLabels:
      app: casino-backend # Coherente
  template:
    metadata:
      labels:
        app: casino-backend # ¡CORREGIDO! Antes decía casino-frontend
    spec:
      containers:
        - name: casino-backend # Coherente
          image: 511249208390.dkr.ecr.us-east-1.amazonaws.com/casino-backend:latest # Asegúrate de cambiar la imagen
          ports:
            - containerPort: 3000 # Puerto del backend
          # Recuerda configurar aquí tus probes /livez y /readyz
          # Y pasar el Secret casino-secrets mediante envFrom
          livenessProbe:
            httpGet:
              path: /livez
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"