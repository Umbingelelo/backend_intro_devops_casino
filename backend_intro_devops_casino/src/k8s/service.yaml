apiVersion: v1
kind: Service
metadata:
  name: casino-backend
  labels:
    app: casino-backend
spec:
  type: ClusterIP # ¡Crucial! No debe ser LoadBalancer
  selector:
    app: casino-backend # Debe coincidir con el label del Deployment del Backend
  ports:
    - protocol: TCP
      port: 3000       # Puerto que usarán los otros servicios para llamar al backend
      targetPort: 3000 # Puerto que escucha tu aplicación en el pod