services:
  db:
    image: postgres:16-alpine
    container_name: casino-db
    restart: always
    environment:
      POSTGRES_USER: casino
      POSTGRES_PASSWORD: casino
      POSTGRES_DB: casino_db
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U casino -d casino_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - casino-network

  backend:
    build: .
    container_name: casino-backend
    restart: always
    environment:
      - PORT=3000
      - JWT_SECRET=casino-secret-key-123
      - JWT_EXPIRES_IN=8h
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=casino
      - DB_PASSWORD=casino
      - DB_NAME=casino_db
      - CORS_ORIGIN=*
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - casino-network

networks:
  casino-network:
    driver: bridge
    name: casino-network

volumes:
  pg_data: